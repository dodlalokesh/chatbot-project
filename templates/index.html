<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<style>
body { margin:0; font-family:Arial; display:flex; height:100vh; }

.left { width:250px; background:#ddd; padding:10px; }
.chat { flex:1; display:flex; flex-direction:column; }

.msgs { flex:1; overflow:auto; padding:10px; }

.msg { padding:8px; margin:5px; border-radius:5px; }

.me { background:#4f46e5; color:white; align-self:flex-end; }
.other { background:#ccc; }

input { padding:10px; }
button { padding:10px; }
</style>
</head>

<body>

<div class="left">
<input id="username" placeholder="Username"><br><br>
<input id="room" placeholder="Room"><br><br>
<button onclick="join()">Join</button>
</div>

<div class="chat">
<div id="msgs" class="msgs"></div>

<div>
<input id="msg" placeholder="Message">
<button onclick="send()">Send</button>
</div>
</div>

<script>
var socket = io();
var user="";
var room="";

function join(){
  user=document.getElementById("username").value;
  room=document.getElementById("room").value;
  socket.emit("join",{username:user,room});
}

socket.on("message",data=>{
  let div=document.createElement("div");
  div.classList.add("msg");

  if(data.user==user){
    div.classList.add("me");
  }else{
    div.classList.add("other");
  }

  div.innerHTML=`<b>${data.user}</b>: ${data.msg}`;
  document.getElementById("msgs").appendChild(div);
});

function send(){
  socket.emit("send_message",{
    username:user,
    room:room,
    message:document.getElementById("msg").value
  });

  document.getElementById("msg").value="";
}
</script>

</body>
</html>
